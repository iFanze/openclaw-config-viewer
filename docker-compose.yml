services:
  oc-config-viewer:
    build: .
    container_name: oc-config-viewer
    network_mode: host
    environment:
      - HOME_DIR=/Users/mengfanze
      - ROOT_DIR=/Users/mengfanze/workspace/home-main-agent
      - PORT=8787
    volumes:
      - /Users/mengfanze:/Users/mengfanze
    restart: unless-stopped
