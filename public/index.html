<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Config Viewer</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Icons from Lucide (https://lucide.dev), MIT License -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2z"/>
      </symbol>
      <symbol id="i-folder-tree" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 10a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1h-2.5a1 1 0 0 1-.8-.4l-.9-1.2A1 1 0 0 0 15 3h-2a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1z"/>
        <path d="M20 21a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1h-2.9a1 1 0 0 1-.88-.55l-.42-.85a1 1 0 0 0-.92-.6H13a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1z"/>
        <path d="M3 5a2 2 0 0 0 2 2h3"/>
        <path d="M3 3v13a2 2 0 0 0 2 2h3"/>
      </symbol>
      <symbol id="i-rotate" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
      </symbol>
      <symbol id="i-save" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
        <path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/>
        <path d="M7 3v4a1 1 0 0 0 1 1h7"/>
      </symbol>
      <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        <line x1="10" x2="10" y1="11" y2="17"/>
        <line x1="14" x2="14" y1="11" y2="17"/>
      </symbol>
      <symbol id="i-file" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </symbol>
      <symbol id="i-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </symbol>
      <symbol id="i-alert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </symbol>
    </defs>
  </svg>

  <div class="app">
    <header class="topbar">
      <button id="toggleTreeBtn" class="btn btn-icon secondary" aria-label="目录" title="目录">
        <svg class="icon" aria-hidden="true"><use href="#i-folder"/></svg>
      </button>
      <button id="rootBtn" class="btn btn-icon secondary" aria-haspopup="dialog" aria-expanded="false" aria-label="切根" title="切根">
        <svg class="icon" aria-hidden="true"><use href="#i-folder-tree"/></svg>
      </button>
      <button id="reloadBtn" class="btn btn-icon secondary" aria-label="重载" title="重载">
        <svg class="icon" aria-hidden="true"><use href="#i-rotate"/></svg>
      </button>
      <div id="fileTitle" class="file-title">未选择文件</div>
      <button id="saveBtn" class="btn btn-icon primary" disabled aria-label="保存" title="保存 (⌘S)">
        <svg class="icon" aria-hidden="true"><use href="#i-save"/></svg>
      </button>
      <button id="deleteBtn" class="btn btn-icon danger" disabled aria-label="删除" title="删除">
        <svg class="icon" aria-hidden="true"><use href="#i-trash"/></svg>
      </button>
    </header>

    <div id="rootPanel" class="root-panel hidden" role="dialog" aria-label="切换根目录">
      <div class="root-panel-row">
        <span class="root-panel-label">当前根</span>
        <code id="rootCurrent">—</code>
      </div>
      <div class="root-panel-row">
        <span class="root-panel-label">HOME</span>
        <code id="rootHome">—</code>
      </div>
      <div class="root-panel-input">
        <input id="rootInput" type="text" placeholder="绝对路径或 ~/...（必须在 HOME 内）" autocomplete="off" />
        <button id="rootApplyBtn" class="btn primary">应用</button>
      </div>
      <div class="root-panel-actions">
        <button id="rootHomeBtn" class="btn secondary">↑ 切到 HOME</button>
        <button id="rootResetBtn" class="btn secondary">↺ 回到初始</button>
      </div>
      <div class="root-panel-presets">
        <div class="root-panel-label">当前根的子目录</div>
        <ul id="rootPresets" class="root-preset-list"></ul>
      </div>
    </div>

    <div class="wrap">
      <aside id="treePanel" class="tree">
        <h3>目录树</h3>
        <ul id="treeRoot"></ul>
      </aside>

      <main class="viewer">
        <textarea id="editor" placeholder="点击左侧文件开始查看和编辑" spellcheck="false"></textarea>
        <div id="status" class="status">就绪</div>
      </main>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
